<div class="container mt-5">
  <div class="row justify-content-md-center">
    <div class="col-md-4">
      @if(err) {
        <div class="alert alert-danger">
          <strong>{{err}}</strong>
        </div>
      }
      <form>
        <div class="txt_field">
          <label>Veuillez entrer le code envoyé par mail</label>
          <input type="text" name="code" [(ngModel)]="code" class="formcontrol"
                 placeholder=" code de confirmation">
        </div>
        <div class="mt-2">
          <button type="button" class="btn btn-success" (click)="onValidateEmail()">Confirmer</button>
        </div>
      </form>
    </div>
  </div>
</div>
