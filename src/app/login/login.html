<div class="container mt-5">
  <div class="row justify-content-md-center">
    <div class="col-md-4">

      @if(err==1)   {
        <div  class="alert alert-danger" >
          <strong>{{message}}</strong>
        </div>
      }

      <form >
        <div class="form-group">
          <label >Nom Utilisateur :</label>
          <input type="text" name="username"
                 class="form-control"
                 [(ngModel)]="user.username" >
        </div>
        <div class="form-group">
          <label >Mot de passe :</label>
          <input type="password"    name="password"
                 [(ngModel)]="user.password"   class="form-control">
        </div>
<!--        <div  class="row justify-content-md-center">-->
<!--          <button type="button" (click)="onLoggedin()"-->
<!--                  class="btn btn-lg btn-primary mt-3">Connexion</button>-->
<!--          <p >Vous n'avez pas un compte? <a routerLink="/register" class=mb-4>S'inscrire </a></p>-->
<!--        </div>-->
        <div class="text-center mt-3">
          <button
            type="button"
            (click)="onLoggedin()"
            class="btn btn-lg btn-primary w-100">
            Connexion
          </button>

          <p class="mt-3"> Vous n'avez pas de compte ?
            <a routerLink="/register" class="fw-bold"> S'inscrire </a>
          </p>
        </div>
      </form>
    </div>
  </div>
</div>
