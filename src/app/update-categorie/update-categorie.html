@if(authService.isAdmin()) {
  <form>
    @if (!ajout) {
      <div>
        <label>ID Catégorie</label>
        <input type="text"
               [(ngModel)]="categorie.idCategorie"
               name="idCategorie"
               class="form-control w-25"
               [readonly]="true">
      </div>
    }

    <div class="mt-2">
      <label>Nom Catégorie</label>
      <input type="text"
             [(ngModel)]="categorie.nomCategorie"
             name="nomCategorie"
             class="form-control"
             placeholder="Entrez un nom de catégorie...">
      <label>Description</label>
      <input type="text"
             [(ngModel)]="categorie.description"
             name="descriptionCategorie"
             class="form-control"
             placeholder="Entrez une description de la catégorie...">
    </div>

    <div class="mt-2 d-flex gap-2">
      <button type="button"
              [disabled]="!categorie.nomCategorie"
              class="btn btn-success"
              (click)="saveCategorie()">
        {{ ajout ? 'Ajouter' : 'Modifier' }}
      </button>

      @if (!ajout) {
        <button type="button"
                class="btn btn-secondary"
                (click)="annuler()">
          Annuler
        </button>
      }
    </div>
  </form>
}
