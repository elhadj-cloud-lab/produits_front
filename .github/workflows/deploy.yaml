name: CI/CD - Produits Front

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ "develop" ]
  push:
    branches:
      - "main"
      - "prod"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          wget https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.70.0_Linux-64bit.deb
          trivy --version
      - name: Run Trivy scan
        run: |
          trivy fs --format sarif --output trivy-results.sarif . || true
          ls -la trivy-results.sarif
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  ci-pr:
    name: Build & Test (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [ security-scan ]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'  # Angular 21 requiert Node 20+
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests (Vitest)
        run: npm test -- --watch=false --run  # ✅ Commande Vitest pour Angular 21

      - name: Build
        run: npm run build --prod

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            dist/
            coverage/  # Vitest génère coverage/
            test-results/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.REGISTRY_IMAGE }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-dev:
    name: Build & Push (DEV)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [security-scan]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build --prod
      - name: Test
        run: npm test -- --watch=false --browsers=ChromeHeadless
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=sha,prefix=dev-
            type=raw,value=dev-latest
      - name: Build and push Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-prod:
    name: Build & Push (PROD)
    if: github.event_name == 'push' && github.ref == 'refs/heads/prod'
    runs-on: ubuntu-latest
    needs: [security-scan]
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build --prod
      - name: Test
        run: npm test -- --watch=false --browsers=ChromeHeadless
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=prod-latest
            type=sha,prefix=prod-
      - name: Build and push Docker
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY_IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}

  gitops-update-dev:
    name: GitOps - Update DEV
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [ci-dev]
    permissions:
      contents: write
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-repo
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - name: Update image tag
        run: |
          cd gitops-repo
          VALUES_FILE="apps/produits_front/values-dev.yaml"

          if [ ! -f "$VALUES_FILE" ]; then
            echo "❌ Fichier non trouvé: $VALUES_FILE"
            exit 1
          fi

          sed -i "s/^\([[:space:]]*tag:\)[[:space:]]*.*/\1 dev-${{ env.SHORT_SHA }}/" "$VALUES_FILE"
          echo "✅ Tag mis à jour: dev-${{ env.SHORT_SHA }}"
      - name: Commit and push
        run: |
          cd gitops-repo
          git config user.name "github-actions"
          git config.user.email "github-actions@github.com"
          git add .
          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "deploy(dev): produits_front dev-${{ env.SHORT_SHA }}"
            git push
          fi
      - name: Notify success
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: '#00ff00'
          SLACK_TITLE: '📦 Produits Front - DEV updated'
          SLACK_MESSAGE: 'produits_front - dev-${{ env.SHORT_SHA }}'

  gitops-update-prod:
    name: GitOps - Update PROD
    if: github.event_name == 'push' && github.ref == 'refs/heads/prod'
    runs-on: ubuntu-latest
    needs: [ci-prod]
    permissions:
      contents: write
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-repo
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - name: Update image tag
        run: |
          cd gitops-repo
          VALUES_FILE="apps/produits_front/values-prod.yaml"

          if [ ! -f "$VALUES_FILE" ]; then
            echo "❌ Fichier non trouvé: $VALUES_FILE"
            exit 1
          fi

          sed -i "s/^\([[:space:]]*tag:\)[[:space:]]*.*/\1 prod-${{ env.SHORT_SHA }}/" "$VALUES_FILE"
          echo "✅ Tag mis à jour: prod-${{ env.SHORT_SHA }}"
      - name: Commit and push
        run: |
          cd gitops-repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "deploy(prod): produits_front prod-${{ env.SHORT_SHA }}"
            git push
          fi
      - name: Notify success
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: '#00ff00'
          SLACK_TITLE: '🚀 Produits Front - PROD deployed'
          SLACK_MESSAGE: 'produits_front - prod-${{ env.SHORT_SHA }}'
